<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
<defs>

  <!-- Background -->
  <linearGradient id="bgG" x1="0.2" y1="0" x2="0.8" y2="1">
    <stop offset="0%"   stop-color="#0d1526"/>
    <stop offset="100%" stop-color="#060c17"/>
  </linearGradient>

  <!-- Silver cap -->
  <linearGradient id="capG" x1="0.15" y1="0" x2="0.85" y2="1">
    <stop offset="0%"   stop-color="#edf0f5"/>
    <stop offset="38%"  stop-color="#cdd3de"/>
    <stop offset="72%"  stop-color="#adb5c6"/>
    <stop offset="100%" stop-color="#8e96a8"/>
  </linearGradient>
  <linearGradient id="capShine" x1="0.1" y1="0" x2="0.9" y2="0.6">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.40"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>

  <!-- Glass body -->
  <linearGradient id="glassG" x1="0" y1="0.5" x2="1" y2="0.5">
    <stop offset="0%"   stop-color="#1a2c52"/>
    <stop offset="18%"  stop-color="#0c1830"/>
    <stop offset="82%"  stop-color="#0c1830"/>
    <stop offset="100%" stop-color="#1a2c52"/>
  </linearGradient>

  <!-- Cyan liquid -->
  <linearGradient id="liqG" x1="0.15" y1="0" x2="0.85" y2="1">
    <stop offset="0%"   stop-color="#00e8ff"/>
    <stop offset="42%"  stop-color="#00b8f5"/>
    <stop offset="100%" stop-color="#0074d9"/>
  </linearGradient>
  <linearGradient id="liqShineG" x1="0.1" y1="0" x2="0.7" y2="0.55">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.38"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>

  <!-- Glass left-edge reflection -->
  <linearGradient id="reflL" x1="0" y1="0.5" x2="1" y2="0.5">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <!-- Glass right-edge subtle highlight -->
  <linearGradient id="reflR" x1="0" y1="0.5" x2="1" y2="0.5">
    <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.09"/>
  </linearGradient>

  <!-- Ambient glow behind vial -->
  <radialGradient id="ambientG" cx="50%" cy="60%" r="38%">
    <stop offset="0%"   stop-color="#0055bb" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>

  <!-- Drop shadow -->
  <filter id="vialShad" x="-20%" y="-10%" width="140%" height="130%">
    <feDropShadow dx="0" dy="14" stdDeviation="24"
      flood-color="#000000" flood-opacity="0.65"/>
  </filter>

  <!-- Soft glow on liquid -->
  <filter id="liqGlow" x="-8%" y="-8%" width="116%" height="116%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Clip liquid to glass interior -->
  <clipPath id="bodyClip">
    <rect x="162" y="178" width="188" height="258" rx="16" ry="16"/>
  </clipPath>

</defs>

<!-- Background rounded square -->
<rect width="512" height="512" rx="112" ry="112" fill="url(#bgG)"/>
<rect width="512" height="512" rx="112" ry="112" fill="url(#ambientG)"/>

<!-- VIAL -->
<g filter="url(#vialShad)">

  <!-- Glass body — white outline -->
  <rect x="155" y="173" width="202" height="268" rx="22" ry="22"
        fill="rgba(255,255,255,0.55)"/>
  <!-- Glass body — dark fill -->
  <rect x="162" y="178" width="188" height="258" rx="16" ry="16"
        fill="url(#glassG)"/>

  <!-- Cyan liquid (clipped to glass) -->
  <g clip-path="url(#bodyClip)" filter="url(#liqGlow)">
    <rect x="162" y="275" width="188" height="161" fill="url(#liqG)"/>
    <rect x="162" y="275" width="188" height="50"  fill="url(#liqShineG)"/>
    <ellipse cx="256" cy="277" rx="84" ry="8" fill="rgba(255,255,255,0.26)"/>
  </g>

  <!-- Glass reflections over liquid -->
  <rect x="162" y="178" width="26" height="258" rx="13" ry="13" fill="url(#reflL)"/>
  <rect x="324" y="178" width="26" height="258" rx="13" ry="13" fill="url(#reflR)"/>

  <!-- Neck — white outline -->
  <rect x="180" y="147" width="152" height="34" rx="7" ry="7"
        fill="rgba(255,255,255,0.55)"/>
  <!-- Neck — glass fill -->
  <rect x="186" y="151" width="140" height="28" rx="5" ry="5"
        fill="url(#glassG)"/>

  <!-- Cap — white outline -->
  <rect x="150" y="108" width="212" height="54" rx="18" ry="18"
        fill="rgba(255,255,255,0.70)"/>
  <!-- Cap — silver fill -->
  <rect x="155" y="111" width="202" height="50" rx="15" ry="15"
        fill="url(#capG)"/>
  <!-- Cap top shine -->
  <ellipse cx="256" cy="115" rx="90" ry="11" fill="url(#capShine)"/>
  <!-- Cap bottom separator -->
  <rect x="150" y="149" width="212" height="13" rx="4" ry="4"
        fill="rgba(0,0,0,0.16)"/>

</g>

</svg>
